name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      # Skip lifecycle scripts so the heavy Playwright Chromium download is
      # avoided — the fast test suite is browser-free.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test
